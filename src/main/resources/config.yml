# Main Config
max-duration: 300
default-radius: 24
default-height: 28
arrow-damage: 4.0
default-density: 10
language: en

# no touchy >:(
# unless you wanna die D:
messages:
  en:
    rain-started: "&6☠ Arrow rain started on {player} for {seconds} seconds!"
    rain-capped: "&eWarning: Duration capped to {max} seconds!"
