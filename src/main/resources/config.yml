    rain-stopped-sender: "&e☠ Arrow rain stopped for {player}!"
    rain-stopped-target: "&e☠ Arrow rain was stopped!"
    rain-incoming: "&c☠ INCOMING ARROW RAIN!"
    no-active-rains: "&eNo active arrow rains!"
    active-rains: "&6Active arrow rains: &f{list}"
    no-rain-for-player: "&cNo active arrow rain for {player}!"
    player-not-found: "&cPlayer not found!"
    seconds-not-number: "&cSeconds must be a number!"
    radius-not-number: "&cRadius must be a number!"
    density-not-number: "&cDensity must be a number!"
    usage: "&cUsage: /arrowrain <player> <seconds> [true/false] [follow/static] [radius] [density]"
    usage-stop: "&c       /arrowrain stop <player>"
    usage-list: "&c       /arrowrain list"
